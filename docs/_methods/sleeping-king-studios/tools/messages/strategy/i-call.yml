---
name: SleepingKingStudios::Tools::Messages::Strategy#call
parent_path: sleeping-king-studios/tools/messages/strategy
signature: 'call(key, parameters: {}, scope: nil, **options)'
slug: call
constructor: false
data_path: sleeping-king-studios/tools/messages/strategy/i-call
description: |-
  If the strategy does not define a message for the key, you can provide a
  default value.

  - If the default value is a Proc, it will be called with the fully
    scoped key, as a positional argument as well as any additional
    keywords passed to #call. The value returned by the Proc will be
    returned by #call.
  - If the default value is any other Object (including nil), the default
    value will be returned by #call.
  - If a default value is not provided, a missing message warning will be
    generated and returned.
params:
- description: the key used to resolve the message.
  name: key
  type:
  - name: String
  - name: Symbol
- description: |-
    the default value to return if the strategy does
    not define a message for the key.
  name: default
  type:
  - name: Object
- description: |-
    the parameters used to generate the message,
    such as values for a template string.
  name: parameters
  type:
  - name: Hash
  default: "{}"
- description: |-
    the namespace for the key. Combined with the given
    key to generate the scoped key value.
  name: scope
  type:
  - name: String
  default: nil
- description: |-
    additional options for resolving or generating the
    message.
  name: options
  type:
  - name: Hash
returns:
- description: |-
    the generated template string, or a generic error
    string if a message is not defined for the given key and parameters.
  type:
  - name: String
short_description: Generates a formatted string for the given key, parameters, and
  options.
version: "*"
