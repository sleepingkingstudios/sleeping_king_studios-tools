---
name: SleepingKingStudios::Tools::ObjectTools#format_inspect
parent_path: sleeping-king-studios/tools/object-tools
signature: 'format_inspect(obj, address: true, properties: {})'
slug: format-inspect
constructor: false
data_path: sleeping-king-studios/tools/object-tools/i-format-inspect
description: |-
  The string representation resembles the output of Object#inspect, but with
  support for BasicObjects and greater customization of the displayed
  properties.
params:
- description: the object to inspect.
  name: obj
  type:
  - name: BasicObject
- description: |-
    if true, includes the formatted memory
    address from Object#inspect. Defaults to true.
  name: address
  type:
  - name: 'true'
  - name: 'false'
  default: 'true'
- description: |-
    the properties to display. If the given
    properties are an Array, maps the values to instance variables or public
    methods based on the property name.
  name: properties
  type:
  - name: Array
  - name: Hash
  default: "{}"
returns:
- description: the string representation of the object.
  type:
  - name: String
short_description: Creates a string representation of the object and specified properties.
version: '1.3'
